<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="page d-flex">
            <!-- start sidebar -->
            <div class="sidebar bg-white p-4 position-relative">
                <h3 class="position-relative text-center mt-0">Sidebar</h3>
                <ul>
                    <li data-label="Dashboard">
                        <a class="d-flex align-items-center fs-14 mt-2 text-black rad-6 p-2" href="index.html"
                            title="Dashboard" aria-label="Dashboard">
                            <i class="fa-solid fa-chart-bar fa-fw"></i>
                            <span class="hide-mobile">Dashboard</span>
                        </a>
                    </li>

                    <li data-label="Settings">
                        <a class=" d-flex align-items-center fs-14 text-black rad-6 p-2" href="settings.html"
                            title="Settings" aria-label="Settings">
                            <i class="fa-solid fa-chart-simple fa-fw"></i>
                            <span>Settings</span>
                        </a>
                    </li>

                    <li data-label="Profile">
                        <a class="active d-flex align-items-center fs-14 text-black rad-6 p-2" href="profile.html"
                            title="Profile" aria-label="Profile">
                            <i class="fa-solid fa-user fa-fw"></i>
                            <span>Profile</span>
                        </a>
                    </li>

                    <li data-label="Projects">
                        <a class="d-flex align-items-center fs-14 text-black rad-6 p-2" href="projects.html"

                            <i class="fa-solid fa-briefcase fa-fw"></i>
                            <span>Projects</span>
                        </a>
                    </li>

                    <li data-label="Courses">
                        <a class="d-flex align-items-center fs-14 text-black rad-6 p-2" href="courses.html"
                            title="Courses" aria-label="Courses">
                            <i class="fa-solid fa-graduation-cap fa-fw"></i>
                            <span>Courses</span>
                        </a>
                    </li>

                    <li data-label="Friends">
                        <a class="d-flex align-items-center fs-14 text-black rad-6 p-2" href="friends.html"
                            title="Friends" aria-label="Friends">
                            <i class="fa-solid fa-user-friends fa-fw"></i>
                            <span>Friends</span>
                        </a>
                    </li>

                    <li data-label="Files">
                        <a class="d-flex align-items-center fs-14 text-black rad-6 p-2" href="files.html" title="Files"
                            aria-label="Files">
                            <i class="fa-solid fa-file fa-fw"></i>
                            <span>Files</span>
                        </a>
                    </li>

                    <li data-label="Plans">
                        <a class="d-flex align-items-center fs-14 text-black rad-6 p-2" href="plans.html" title="Plans"
                            aria-label="Plans">
                            <i class="fa-solid fa-list-check fa-fw"></i>
                            <span>Plans</span>
                        </a>
                    </li>
                </ul>
            </div>
            <!-- End sidebar -->

            <div class="content w-100 overflow-hidden">
                <!-- start head -->
                <div class="head bg-white d-flex justify-content-between align-items-center p-4">
                    <div class="search position-relative">
                        <input class="p-2" type="search" placeholder="Type A Keyword ">
                    </div>
                    <div class="icons d-flex align-items-center">
                        <span class="notification position-relative">
                            <i class="fa-regular fa-bell fa-lg"></i>
                        </span>
                        <img src="image/swiper.webp" alt="icon-img" class="ms-3" width="32" height="32">
                    </div>
                </div>
                <!-- End head -->
                <h1 class="position-relative fw-semibold">Profile</h1>

                <div class="wrapper d-grid gap-3">
                    <!-- start overview -->
                    <div class="overview p-4 rounded-4 bg-white d-flex align-items-center">
                        <div class="avatar-box">
                            <img src="image/avatar.webp" alt="image/avatar" width="60" height="60" loading="lazy" class="img-fluid rounded-circle mb-2">
                            <h3 class="m-0">Adel Nasser</h3>
                            <p class="text-welcome mt-2">Level 20</p>
                            <div class="level rounded-2 bg-body-secondary position-relative">
                                <span style="width: 70%;">0000</span>
                            </div>
                            <div class="rating mt-2 mb-2">
                                <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i>
                                <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i>
                                <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i>
                                <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i>
                                <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i>
                            </div>
                            <p class="text-welcome m-0 fs-6">550 Rating</p>
                        </div>
                        <div class="info-box">

                        </div>
                    </div>
                    <!-- End overview-->
                    <!-- start my skills -->

                    <!-- End my skills -->

                    <!-- End lastest activities -->

        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>

</html>
