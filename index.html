<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <header>
        <div class="page d-flex">
            <div class="sidebar bg-white  p-4 position-relative">
                <h3 class="position-relative text-center mt-0">Sidebar</h3>
                <ul>
                    <li data-label="Dashboard">
                        <a class="active  d-flex align-items-center fs-14 mt-2  text-black rad-6 p-2" href="index.html"
                            title="Dashboard" aria-label="Dashboard">
                            <i class="fa-solid fa-chart-bar fa-fw"></i>
                            <span class="hide-mobile">Dashboard</span>
                        </a>
                    </li>

                    <li data-label="Settings">
                        <a class="  d-flex align-items-center fs-14  text-black rad-6 p-2" href="settings.html"
                            title="Settings" aria-label="Settings">
                            <i class="fa-solid fa-chart-simple fa-fw"></i>
                            <span>Settings</span>
                        </a>
                    </li>

                    <li data-label="Profile">
                        <a class="d-flex align-items-center fs-14  text-black rad-6 p-2" href="profile.html"
                            title="Profile" aria-label="Profile">
                            <i class="fa-solid fa-user fa-fw"></i>
                            <span>Profile</span>
                        </a>
                    </li>

                    <li data-label="Projects">
                        <a class="  d-flex align-items-center fs-14  text-black rad-6 p-2" href="projects.html"
                            title="Projects" aria-label="Projects">
                            <i class="fa-solid fa-briefcase fa-fw"></i>
                            <span>Projects</span>
                        </a>
                    </li>

                    <li data-label="Courses">
                        <a class="  d-flex align-items-center fs-14  text-black rad-6 p-2" href="courses.html"
                            title="Courses" aria-label="Courses">
                            <i class="fa-solid fa-graduation-cap fa-fw"></i>
                            <span>Courses</span>
                        </a>
                    </li>

                    <li data-label="Friends">
                        <a class="d-flex align-items-center fs-14  text-black rad-6 p-2" href="friends.html"
                            title="Friends" aria-label="Friends">
                            <i class="fa-solid fa-user-friends fa-fw"></i>
                            <span>Friends</span>
                        </a>
                    </li>

                    <li data-label="Files">
                        <a class="  d-flex align-items-center fs-14  text-black rad-6 p-2" href="files.html"
                            title="Files" aria-label="Files">
                            <i class="fa-solid fa-file fa-fw"></i>
                            <span>Files</span>
                        </a>
                    </li>

                    <li data-label="Plans">
                        <a class="  d-flex align-items-center fs-14  text-black rad-6 p-2" href="plans.html"
                            title="Plans" aria-label="Plans">
                            <i class="fa-solid fa-list-check fa-fw"></i>
                            <span>Plans</span>
                        </a>
                    </li>

                </ul>
            </div>

            <div class="content w-100 overflow-hidden">
                <!-- start head -->
                <div class="head bg-white d-flex justify-content-between align-items-center p-3">
                    <div class="search position-relative">
                        <input class="p-2" type="search" placeholder="Type A Keyword ">
                    </div>
                    <div class="icons d-flex align-items-center">
                        <span class="notification position-relative">
                            <i class="fa-regular fa-bell fa-lg"></i>
                        </span>
                        <img src="image/swiper.webp" alt="icon-img" class=" ms-3" width="32" height="32">
                    </div>
                </div>
                <!-- End head -->
                <h1 class="position-relative">Dashboard</h1>
                <div class="wrapper d-grid gap-3">
                    <!-- start welcome -->
                    <div class="welcome bg-white text-lg-start text-center d-md-block overflow-hidden rounded-2 ">
                        <div class="intro d-flex justify-content-between  p-3">
                            <div>
                                <h2 class="m-0">Welcome</h2>
                                <p class="text-welcome mt-3">Elzero</p>
                            </div>
                            <img src="image/welcome.webp" alt="Welcome" width="100" height="100" loading="lazy"
                                class="img-fluid d-md-block d-none">
                        </div>
                        <img src="image/avatar.webp" alt="avatar" width="100" height="100" loading="lazy"
                            class="avatar img-fluid text-md-center">

                        <div class="body text-center d-md-flex p-3 mt-3 mb-3  d-sm-block">
                            <div>Osama ELzero <span class="d-block mt-3 fs-6">Developer</span></div>
                            <div>80 <span class="d-block mt-3 fs-6">Projects</span></div>
                            <div>$8500<span class="d-block mt-3 fs-6">Earned</span></div>
                        </div>
                        <a title="Visit Profile" aria-label="Visit Profile" href="profile.html" class="visit d-block fs-6 rounded-2  text-white p-1 w-fit">Profile</a>
                    </div>
                    <!-- End welcome -->
                    <!-- start Quick-draft -->
                    <div class="quick-draft bg-white p-3 rounded-2">
                        <h2 class="mt-0 mb-3 fw-bold">Quick Draft</h2>
                        <p class="text-welcome mt-0 mb-3 fs-6 ">Write A Draft For You Ideas</p>
                        <form class="mt-3">
                            <input type="text" class="form-control md-5 d-block" placeholder="Title">
                            <textarea class="form-control mt-3 d-block" rows="4"
                                placeholder="What's On Your Mind?"></textarea>
                            <input type="submit" class="save d-block  rounded-2  text-white p-1 w-fit border-0 mt-3"
                                value="save">
                        </form>

                    </div>
                    <!-- End Quick-draft -->
                    <!-- start targets -->
                    <div class="targets p-3 bg-white rounded-2">
                        <h2></h2>
                        <p></p>
                    </div>
                    <!-- End targets -->
                </div>
            </div>
        </div>
    </header>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
</body>

</html>
